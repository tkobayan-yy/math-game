<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>くりさがりの ひきざん ゲーム</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Hiragino Maru Gothic Pro', 'Rounded Mplus 1c', sans-serif;
      background: #f0f7ff;
      min-height: 100vh;
      padding: 16px;
    }
    h1 {
      text-align: center;
      font-size: 20px;
      color: #1a5fa8;
      margin-bottom: 12px;
    }
    .score-row {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-bottom: 12px;
    }
    .score-card {
      background: white;
      border-radius: 12px;
      padding: 8px 18px;
      text-align: center;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    }
    .score-card .s-label { font-size: 11px; color: #888; }
    .score-card .s-val { font-size: 24px; font-weight: bold; color: #333; }

    .stars {
      text-align: center;
      font-size: 26px;
      color: #f0a500;
      letter-spacing: 4px;
      min-height: 36px;
      margin-bottom: 4px;
    }

    .problem-display {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin: 12px 0;
    }
    .num-big { font-size: 56px; font-weight: bold; color: #222; }
    .num-op { font-size: 40px; color: #666; }
    .answer-input {
      font-size: 56px;
      font-weight: bold;
      width: 90px;
      text-align: center;
      border: 3px solid #aad4f5;
      border-radius: 12px;
      background: white;
      color: #1a5fa8;
      padding: 0 6px;
      -webkit-appearance: none;
    }
    .answer-input:focus { outline: none; border-color: #378ADD; box-shadow: 0 0 0 4px rgba(55,138,221,0.2); }

    .feedback {
      font-size: 22px;
      font-weight: bold;
      text-align: center;
      min-height: 32px;
      margin: 6px 0;
    }
    .feedback.correct { color: #0f6e56; }
    .feedback.wrong { color: #c0392b; }

    .hint-box {
      background: #fff9e6;
      border: 2px solid #f0c040;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 15px;
      color: #555;
      margin: 8px 0;
      line-height: 1.7;
    }
    .hint-box span { color: #1a5fa8; font-weight: bold; }

    .section-title {
      font-size: 13px;
      font-weight: bold;
      color: #888;
      margin: 10px 0 4px;
    }

    .block-area {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      margin: 8px 0 12px;
      min-height: 60px;
      align-items: flex-start;
    }
    .block-group { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .block-label { font-size: 12px; color: #888; }
    .blocks-row { display: flex; flex-wrap: wrap; gap: 4px; }
    .blocks-row.grouped { max-width: 344px; }
    .block {
      width: 64px; height: 64px;
      border-radius: 10px;
      border: 2px solid transparent;
      transition: opacity 0.2s, transform 0.15s;
    }
    .block.ten { background: #378ADD; border-color: #185FA5; }
    .block.one { background: #1D9E75; border-color: #0F6E56; }
    .block.borrowed { background: #EF9F27; border-color: #BA7517; }
    .block.crossed { opacity: 0.18; transform: scale(0.82); }

    .borrow-btn {
      background: #fff3cd;
      color: #7d5a00;
      border: 2px solid #f0c040;
      border-radius: 12px;
      padding: 10px 16px;
      font-size: 15px;
      font-family: inherit;
      cursor: pointer;
      width: 100%;
      margin-bottom: 8px;
      font-weight: bold;
    }
    .borrow-btn:active { background: #ffe08a; }
    .borrow-btn:disabled { opacity: 0.4; cursor: default; }

    .btn-row { display: flex; gap: 8px; }
    .btn-check, .btn-next {
      flex: 1;
      padding: 14px;
      border-radius: 14px;
      font-size: 18px;
      font-weight: bold;
      font-family: inherit;
      cursor: pointer;
      border: none;
    }
    .btn-check { background: #378ADD; color: white; }
    .btn-check:active { background: #185FA5; }
    .btn-next { background: #1D9E75; color: white; display: none; }
    .btn-next:active { background: #0F6E56; }

    .level-badge {
      display: inline-block;
      background: #e8f4fe;
      color: #185FA5;
      border-radius: 20px;
      padding: 2px 12px;
      font-size: 13px;
      font-weight: bold;
      margin-left: 6px;
    }
  </style>
</head>
<body>

<h1>くりさがりの ひきざん <span class="level-badge" id="level-badge">レベル1</span></h1>

<div class="score-row">
  <div class="score-card">
    <div class="s-label">せいかい</div>
    <div class="s-val" id="correct-count">0</div>
  </div>
  <div class="score-card">
    <div class="s-label">もんだい</div>
    <div class="s-val" id="total-count">0</div>
  </div>
</div>

<div class="stars" id="stars-display"></div>

<div class="problem-display">
  <span class="num-big" id="num-a">13</span>
  <span class="num-op">－</span>
  <span class="num-big" id="num-b">7</span>
  <span class="num-op">=</span>
  <input class="answer-input" type="number" id="answer-input" min="0" max="99" inputmode="numeric" placeholder="?" />
</div>

<div class="feedback" id="feedback"></div>

<div class="hint-box" id="hint-box">
  ヒント: <span id="hint-text">ブロックを見ながら考えよう！</span>
</div>

<div class="section-title">ブロックで考えよう</div>
<div class="block-area" id="block-area"></div>

<button class="borrow-btn" id="borrow-btn" onclick="doBorrow()">じゅうのくらいから 1つかりる</button>

<div class="btn-row">
  <button class="btn-check" onclick="checkAnswer()">こたえをかくにん</button>
  <button class="btn-next" id="next-btn" onclick="nextQuestion()">つぎへ →</button>
</div>

<script>
  var state = { a:0, b:0, tens:0, ones:0, borrowed:false, correct:0, total:0, level:1, answered:false };

  var problems = {
    1: [[11,2],[12,3],[13,4],[14,5],[15,6],[16,7],[17,8],[11,3],[12,4],[13,5],[14,6],[15,7],[16,8],[17,9]],
    2: [[21,3],[22,5],[23,6],[24,7],[31,4],[32,5],[33,8],[41,3],[42,6],[51,4],[61,5],[71,3],[81,4],[91,6]],
    3: [[23,14],[31,12],[42,13],[34,15],[53,24],[62,33],[41,22],[55,26],[37,18],[44,15],[63,27],[72,34]]
  };

  function genQuestion() {
    var pool = problems[state.level] || problems[1];
    var idx = Math.floor(Math.random() * pool.length);
    var pair = pool[idx];
    state.a = pair[0]; state.b = pair[1];
    state.tens = Math.floor(state.a / 10);
    state.ones = state.a % 10;
    state.borrowed = false; state.answered = false;
    renderProblem();
  }

  function renderProblem() {
    document.getElementById('num-a').textContent = state.a;
    document.getElementById('num-b').textContent = state.b;
    document.getElementById('answer-input').value = '';
    document.getElementById('feedback').textContent = '';
    document.getElementById('feedback').className = 'feedback';
    document.getElementById('next-btn').style.display = 'none';
    document.getElementById('borrow-btn').disabled = (state.ones >= state.b % 10 || state.tens === 0);
    document.getElementById('stars-display').textContent = '';
    document.getElementById('level-badge').textContent = 'レベル' + state.level;
    renderBlocks(); updateHint();
  }

  function renderBlocks() {
    var area = document.getElementById('block-area');
    area.innerHTML = '';
    if (state.tens > 0 || state.borrowed) {
      var g1 = document.createElement('div'); g1.className = 'block-group';
      var row1 = document.createElement('div'); row1.className = 'blocks-row';
      var totalTens = state.tens + (state.borrowed ? 1 : 0);
      for (var i = 0; i < totalTens; i++) {
        var b = document.createElement('div');
        b.className = 'block ten' + (state.borrowed && i === state.tens ? ' crossed' : '');
        row1.appendChild(b);
      }
      var l1 = document.createElement('div'); l1.className = 'block-label'; l1.textContent = '10のくらい';
      g1.appendChild(row1); g1.appendChild(l1); area.appendChild(g1);
    }
    var g2 = document.createElement('div'); g2.className = 'block-group';
    var row2 = document.createElement('div');
    row2.className = 'blocks-row' + (state.borrowed ? ' grouped' : '');
    var totalOnes = state.ones + (state.borrowed ? 10 : 0);
    var bOnes = state.b % 10;
    for (var j = 0; j < totalOnes; j++) {
      var b2 = document.createElement('div');
      var isBorrowed = state.borrowed && j < 10;
      var isCrossed = state.answered && j >= (totalOnes - bOnes);
      b2.className = 'block one' + (isBorrowed ? ' borrowed' : '') + (isCrossed ? ' crossed' : '');
      b2.addEventListener('click', function() {
        if (!state.answered) this.classList.toggle('crossed');
      });
      row2.appendChild(b2);
    }
    var l2 = document.createElement('div'); l2.className = 'block-label'; l2.textContent = '1のくらい';
    g2.appendChild(row2); g2.appendChild(l2); area.appendChild(g2);
  }

  function doBorrow() {
    if (state.borrowed || state.tens <= 0) return;
    state.tens -= 1; state.borrowed = true;
    document.getElementById('borrow-btn').disabled = true;
    renderBlocks(); updateHint();
  }

  function updateHint() {
    var onesHave = state.ones + (state.borrowed ? 10 : 0);
    var onesNeed = state.b % 10;
    var tensNeed = Math.floor(state.b / 10);
    var t = document.getElementById('hint-text');
    if (!state.borrowed && state.ones < onesNeed) {
      t.innerHTML = '1のくらいが <span>' + state.ones + '</span> しかない！10のくらいから1つかりよう';
    } else if (state.borrowed) {
      t.innerHTML = '10をかりたので1のくらいが <span>' + onesHave + '</span> になった！<br>' +
        onesHave + ' − ' + onesNeed + ' = <span>' + (onesHave - onesNeed) + '</span>、' +
        '10のくらいは <span>' + state.tens + '</span> − <span>' + tensNeed + '</span> = <span>' + (state.tens - tensNeed) + '</span>';
    } else {
      t.innerHTML = '<span>' + state.a + '</span> − <span>' + state.b + '</span> を計算しよう！';
    }
  }

  function checkAnswer() {
    if (state.answered) return;
    var val = parseInt(document.getElementById('answer-input').value);
    var correct = state.a - state.b;
    var fb = document.getElementById('feedback');
    state.total++;
    document.getElementById('total-count').textContent = state.total;
    if (val === correct) {
      state.correct++;
      document.getElementById('correct-count').textContent = state.correct;
      fb.textContent = 'せいかい！ すばらしい！';
      fb.className = 'feedback correct';
      document.getElementById('stars-display').textContent = '★★★';
      state.answered = true;
      renderBlocks();
      if (state.correct % 5 === 0 && state.level < 3) { state.level++; }
      setTimeout(function() { nextQuestion(); }, 1500);
    } else if (!isNaN(val)) {
      fb.textContent = 'もういちど！ ヒントを見てみよう';
      fb.className = 'feedback wrong';
      document.getElementById('stars-display').textContent = '☆☆☆';
    }
  }

  function nextQuestion() { genQuestion(); }

  document.getElementById('answer-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') checkAnswer();
  });

  genQuestion();
</script>
</body>
</html>
